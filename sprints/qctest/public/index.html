<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteBox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav-bar">
    <h1>NoteBox</h1>
    <a href="/stats.html" class="nav-link">Stats</a>
  </nav>

  <main class="container">
    <button id="new-note-btn" class="btn-primary">New Note</button>

    <form id="note-form" class="note-form hidden">
      <input type="text" id="note-title" placeholder="Title" maxlength="200" required>
      <textarea id="note-body" placeholder="Note body..." required></textarea>
      <div class="form-actions">
        <button type="submit" class="btn-primary">Save</button>
        <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
      </div>
    </form>

    <div id="empty-state" class="empty-state">
      No notes yet. Click "New Note" to create one.
    </div>

    <div id="notes-container" class="notes-grid"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
