<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteBox - Notes</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>NoteBox</h1>
      <nav>
        <a href="/stats" class="nav-link">View Stats</a>
      </nav>
    </header>

    <main>
      <section class="new-note-section">
        <button id="new-note-btn" class="btn btn-primary">New Note</button>

        <form id="new-note-form" class="new-note-form hidden">
          <div class="form-group">
            <label for="note-title">Title</label>
            <input type="text" id="note-title" name="title" placeholder="Enter note title" required>
          </div>

          <div class="form-group">
            <label for="note-body">Body</label>
            <textarea id="note-body" name="body" placeholder="Enter note body" rows="5" required></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
          </div>
        </form>
      </section>

      <section id="notes-list" class="notes-list">
        <!-- Note cards will be dynamically inserted here -->
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
