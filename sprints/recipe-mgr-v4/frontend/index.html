<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Manager</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1 class="app-title">Recipe Manager</h1>
            <ul class="nav-tabs">
                <li><a href="#recipes" class="nav-link active" data-view="recipes">Recipes</a></li>
                <li><a href="#planner" class="nav-link" data-view="planner">Meal Plan</a></li>
                <li><a href="#shopping" class="nav-link" data-view="shopping">Shopping List</a></li>
            </ul>
        </div>
    </nav>

    <main id="main-content" class="main-content">
        <!-- View content will be mounted here -->
    </main>

    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close" aria-label="Close modal">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/recipes.js"></script>
    <script src="/js/planner.js"></script>
    <script src="/js/shopping.js"></script>
</body>
</html>
