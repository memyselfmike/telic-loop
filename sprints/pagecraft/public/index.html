<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageCraft - Landing Page Builder</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/templates.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>PageCraft</h1>
      <p>Drag-and-Drop Landing Page Builder</p>
    </header>

    <main class="app-main">
      <div id="template-selector" class="template-selector">
        <h2>Choose a Template</h2>
        <div id="template-cards" class="template-cards"></div>
      </div>

      <div class="editor-container" style="display: none;">
        <aside id="workspace" class="workspace">
          <h3>Sections</h3>
          <div id="section-list" class="section-list"></div>
        </aside>

        <div id="preview-panel" class="preview-panel">
          <div class="preview-controls">
            <button id="change-template-btn" class="viewport-toggle">Change Template</button>
            <button id="toggle-viewport" class="viewport-toggle">Mobile</button>
            <input type="color" id="accent-color" value="#3b82f6">
            <button id="export-btn" class="export-btn">Export HTML</button>
          </div>
          <div id="preview-frame" class="preview-frame desktop">
            <div id="preview-content" class="preview-content"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/dragdrop.js"></script>
</body>
</html>
